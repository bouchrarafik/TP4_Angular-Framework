<div class="p-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

          <h5 class="card-title mb-4">
            <i class="bi bi-pencil-square me-2 text-warning"></i>Modifier le produit
          </h5>

          <form *ngIf="productFormGroup" [formGroup]="productFormGroup" (ngSubmit)="updateProduct()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
              <input
                class="form-control"
                formControlName="name"
                [class.is-invalid]="productFormGroup.get('name')?.invalid && productFormGroup.get('name')?.touched">
              <div class="invalid-feedback">Le nom est obligatoire.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Prix (MAD) <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                <input type="number" class="form-control" formControlName="price" min="0">
              </div>
            </div>

            <div class="mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" formControlName="checked" id="checkedEdit">
                <label class="form-check-label" for="checkedEdit">Marquer comme coché</label>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" [disabled]="productFormGroup.invalid" class="btn btn-warning px-4">
                <i class="bi bi-save me-2"></i>Mettre à jour
              </button>
              <a routerLink="/products" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-2"></i>Retour
              </a>
            </div>

          </form>

          <div *ngIf="!productFormGroup" class="text-center py-4 text-muted">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2">Chargement du produit...</p>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
