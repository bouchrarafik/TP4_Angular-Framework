<div class="p-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

          <h5 class="card-title mb-4">
            <i class="bi bi-plus-circle me-2 text-success"></i>Nouveau produit
          </h5>

          <form [formGroup]="productForm" (ngSubmit)="saveProduct()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
              <input
                class="form-control"
                formControlName="name"
                placeholder="Ex: Laptop HP Pavilion"
                [class.is-invalid]="productForm.get('name')?.invalid && productForm.get('name')?.touched">
              <div class="invalid-feedback">Le nom est obligatoire.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Prix (MAD) <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                <input
                  type="number"
                  class="form-control"
                  formControlName="price"
                  placeholder="0.00"
                  min="0">
              </div>
            </div>

            <div class="mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" formControlName="checked" id="checkedBox">
                <label class="form-check-label" for="checkedBox">Marquer comme coché</label>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" [disabled]="productForm.invalid" class="btn btn-success px-4">
                <i class="bi bi-save me-2"></i>Enregistrer
              </button>
              <a routerLink="/products" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-2"></i>Retour
              </a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
