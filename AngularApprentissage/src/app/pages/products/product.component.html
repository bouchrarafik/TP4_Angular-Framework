<div class="p-4">
  <div class="card border-0 shadow-sm">
    <div class="card-body">

      <h5 class="card-title mb-3">
        <i class="bi bi-box-seam me-2 text-success"></i>Liste des produits
      </h5>

      <!-- Search bar -->
      <div class="input-group mb-4" style="max-width: 400px;">
        <input
          type="text"
          class="form-control"
          placeholder="Rechercher un produit..."
          [(ngModel)]="appState.productsState.keyword"
          (keyup.enter)="searchProducts()">
        <button (click)="searchProducts()" class="btn btn-success">
          <i class="bi bi-search"></i>
        </button>
      </div>

      <!-- Table -->
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-3">
          <thead class="table-success">
            <tr>
              <th>#</th>
              <th>Nom</th>
              <th>Prix (MAD)</th>
              <th class="text-center">Coché</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of appState.productsState.products; let i = index"
                [class.table-success]="product.checked">
              <td class="text-muted">{{ product.id }}</td>
              <td class="fw-semibold">{{ product.name }}</td>
              <td>{{ product.price | number:'1.2-2' }}</td>
              <td class="text-center">
                <button
                  (click)="handleCheckProduct(product)"
                  [class]="product.checked ? 'btn btn-success btn-sm' : 'btn btn-outline-secondary btn-sm'"
                  title="Basculer l'état">
                  <i [class]="product.checked ? 'bi bi-check-circle-fill' : 'bi bi-circle'"></i>
                </button>
              </td>
              <td class="text-center">
                <div class="d-flex justify-content-center gap-1">
                  <button
                    (click)="handleEditProduct(product)"
                    class="btn btn-outline-primary btn-sm"
                    title="Modifier">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button
                    (click)="handleDeleteProduct(product)"
                    class="btn btn-outline-danger btn-sm"
                    title="Supprimer">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="appState.productsState.products.length === 0">
              <td colspan="5" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>Aucun produit trouvé
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <nav *ngIf="appState.productsState.totalPages > 1">
        <ul class="pagination pagination-sm mb-0">
          <li
            *ngFor="let page of [].constructor(appState.productsState.totalPages); let i = index"
            class="page-item"
            [class.active]="appState.productsState.currentpage === i + 1">
            <button (click)="handleGotoPage(i + 1)" class="page-link">{{ i + 1 }}</button>
          </li>
        </ul>
      </nav>

    </div>
  </div>
</div>
