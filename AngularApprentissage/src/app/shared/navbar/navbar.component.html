<nav class="navbar navbar-expand-lg navbar-dark bg-success px-3 shadow-sm">
  <a class="navbar-brand fw-bold" routerLink="/home">
    <i class="bi bi-box-seam me-2"></i>Product Manager
  </a>

  <div class="d-flex align-items-center ms-auto gap-2 flex-wrap">
    <a
      *ngFor="let action of actions"
      [routerLink]="action.route"
      class="btn btn-sm"
      [class.btn-light]="isActive(action.route)"
      [class.btn-outline-light]="!isActive(action.route)">
      <i class="bi bi-{{ action.icon }} me-1"></i>{{ action.title }}
    </a>

    <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-light ms-2" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>
</nav>
